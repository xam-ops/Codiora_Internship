  { id:2, emoji:"🎨", tag:"CSS", title:"5 Tailwind CSS Tricks I Wish I Knew Earlier", excerpt:"From group hover to arbitrary values — tricks that changed how I build UI every single day.", content:"<p>I've been using Tailwind for over a year and these tricks changed how I write UI.</p><p style='margin-top:12px'><strong style='color:white'>1. Group hover.</strong> Use group on a parent and group-hover: on children to create hover effects that ripple through an element.</p><p style='margin-top:12px'><strong style='color:white'>2. Arbitrary values.</strong> Need a specific size? Use square brackets: w-[342px] or text-[13px].</p><p style='margin-top:12px'><strong style='color:white'>3. @apply in your CSS.</strong> When a pattern repeats 20 times, abstract it with @apply.</p><p style='margin-top:12px'><strong style='color:white'>4. Dark mode with dark:.</strong> Built-in dark mode support. Just add dark: prefix and toggle the class on root.</p><p style='margin-top:12px'><strong style='color:white'>5. Responsive stacking.</strong> Start mobile-first with flex-col then switch to md:flex-row.</p>" },

// ── HERO ──────────────────────────────────────────────────────
function Hero({ profile, loading }) {
  const [displayed, setDisplayed] = useState('');
  const [roleIdx, setRoleIdx] = useState(0);
  const [typing, setTyping] = useState(true);
  const canvasRef = useRef(null);
  const roles = ['SEO Expert','Web Developer','Frontend Dev','BSE Student @ SAU'];

  useEffect(() => {
    const target = roles[roleIdx];
    let i = displayed.length;
    if (typing) {
      if (i < target.length) { const t = setTimeout(() => setDisplayed(target.slice(0,i+1)), 80); return () => clearTimeout(t); }
      else { const t = setTimeout(() => setTyping(false), 1500); return () => clearTimeout(t); }
    } else {
      if (i > 0) { const t = setTimeout(() => setDisplayed(target.slice(0,i-1)), 40); return () => clearTimeout(t); }
      else { setRoleIdx(r => (r+1)%roles.length); setTyping(true); }
    }
  }, [displayed, typing, roleIdx]);

  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, particles = [], raf;
    const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener('resize', resize, { passive:true });
    for (let i = 0; i < 40; i++) particles.push({ x:Math.random()*1000, y:Math.random()*600, r:Math.random()*1.5+0.5, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3, a:Math.random() });
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.a+=0.01;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(108,99,255,${0.3+Math.sin(p.a)*0.3})`; ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <section id="home" className="relative min-h-screen flex items-center overflow-hidden pt-20" aria-label="Hero section">
      <div className="blob w-96 h-96 opacity-10 top-10 -left-20" style={{background:'#6c63ff'}} />
      <div className="blob w-72 h-72 opacity-10 bottom-20 right-10" style={{background:'#f5c842'}} />
      <canvas ref={canvasRef} aria-hidden="true" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0,opacity:0.4}} />
      <div className="relative z-10 max-w-6xl mx-auto px-6 py-20 grid md:grid-cols-2 gap-12 items-center w-full">
        <div className="fade-in">
          {loading ? (
            <div className="space-y-4">
              <SkeletonBox className="h-4 w-48" />
              <SkeletonBox className="h-16 w-full" />
              <SkeletonBox className="h-5 w-64" />
              <SkeletonBox className="h-4 w-full" />
              <div className="flex gap-3 pt-2"><SkeletonBox className="h-10 w-28 rounded-xl" /><SkeletonBox className="h-10 w-28 rounded-xl" /></div>
            </div>
          ) : profile ? (
            <>
              <p className="section-label mb-4">// CS Student · Hyderabad, Sindh</p>
              <h1 className="hero-name text-6xl md:text-7xl mb-4" style={{color:'var(--text-main)'}}>
                Zaid<br/>Mujtaba<br/><span className="gradient-text">Khan</span>
              </h1>
              <p className="text-lg mt-2" style={{color:'var(--text-sub)'}}>
                <span className="typewriter-text font-medium" style={{color:'#a09bff'}}>{displayed}</span>
              </p>
              <p className="mt-3 max-w-md text-sm leading-relaxed" style={{color:'var(--text-sub)'}}>{profile.bio}</p>

function SkillBar({ name, level, gold }) {
  const [filled, setFilled] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting){setFilled(true);obs.disconnect();} }, {threshold:0.4});
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className="space-y-1">
      <div className="flex justify-between text-xs">
        <span style={{color:'var(--text-sub)'}}>{name}</span>
        <span className="font-medium" style={{color:gold?'#f5c842':'#a09bff'}}>{level}%</span>
      </div>
      <div className="h-1.5 rounded-full" style={{background:'var(--border-col)'}}>
        <div className={`skill-bar-fill ${gold?'skill-bar-gold':''}`} style={{width:filled?`${level}%`:'0'}} role="progressbar" aria-valuenow={level} aria-valuemin={0} aria-valuemax={100} />
      </div>
    </div>
  );
}

function Contact({ profile }) {
  const [form, setForm] = useState({firstName:'',lastName:'',email:'',subject:'',message:''});
  const [errors, setErrors] = useState({});
  const [sending, setSending] = useState(false);
  const [notif, setNotif] = useState({show:false,icon:'',title:'',msg:'',success:true});

  const update = f => e => { setForm(p=>({...p,[f]:e.target.value})); if(errors[f]) setErrors(p=>({...p,[f]:null})); };
  const valid = () => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email);
  const submit = async e => {
    e.preventDefault();
    const errs = {};
    if(!form.firstName.trim()) errs.firstName='Required';
    if(!form.lastName.trim()) errs.lastName='Required';
    if(!valid()) errs.email='Enter a valid email';
    if(!form.message.trim()) errs.message='Required';
    if(Object.keys(errs).length) { setErrors(errs); return; }
    setSending(true);
    await delay(1400); // Simulated Fetch API call
    setSending(false);
    setForm({firstName:'',lastName:'',email:'',subject:'',message:''});
    setNotif({show:true,icon:'✅',title:'Message sent!',msg:`I'll get back to you soon, ${form.firstName}!`,success:true});
    setTimeout(()=>setNotif(p=>({...p,show:false})),4000);
  };

  return (
    <section id="contact" className="py-28 relative" aria-label="Contact section">
      <div className="max-w-6xl mx-auto px-6">
        <div className="text-center mb-14">
          <p className="section-label mb-3">// Get In Touch</p>
          <h2 className="text-4xl font-display font-bold" style={{color:'var(--text-main)'}}>Let's connect<br/><span className="gradient-text">&amp; collaborate</span></h2>
        </div>
        <div className="grid md:grid-cols-2 gap-12">
          <form onSubmit={submit} noValidate aria-label="Contact form" className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <div>
                <input type="text" placeholder="First Name" value={form.firstName} onChange={update('firstName')} className={`form-input ${errors.firstName?'error':''}`} aria-label="First name" />
                {errors.firstName && <p className="text-xs text-red-400 mt-1">{errors.firstName}</p>}
              </div>
              <div>
                <input type="text" placeholder="Last Name" value={form.lastName} onChange={update('lastName')} className={`form-input ${errors.lastName?'error':''}`} aria-label="Last name" />
                {errors.lastName && <p className="text-xs text-red-400 mt-1">{errors.lastName}</p>}
              </div>
            </div>
            <div>
              <input type="email" placeholder="Email Address" value={form.email} onChange={update('email')} className={`form-input ${errors.email?'error':''}`} aria-label="Email" />
              {errors.email && <p className="text-xs text-red-400 mt-1">{errors.email}</p>}
            </div>
            <input type="text" placeholder="Subject (optional)" value={form.subject} onChange={update('subject')} className="form-input" aria-label="Subject" />
            <div>
              <textarea rows={5} placeholder="Tell me what you have in mind..." value={form.message} onChange={update('message')} className={`form-input resize-none ${errors.message?'error':''}`} aria-label="Message" />
              {errors.message && <p className="text-xs text-red-400 mt-1">{errors.message}</p>}
            </div>
            <button type="submit" disabled={sending} className="btn-glow bg-accent text-white w-full py-3.5 rounded-xl font-semibold text-sm transition-all disabled:opacity-50">
              {sending ? 'Sending... ⏳' : 'Send Message ✉️'}
            </button>
          </form>
          <div className="space-y-4">
            {profile && [
              {icon:'📧',label:'Email',val:profile.email,href:`mailto:${profile.email}`},
              {icon:'📍',label:'Location',val:profile.location,href:null},
              {icon:'⚡',label:'GitHub',val:'github.com/xam-ops',href:profile.github},
              {icon:'💬',label:'WhatsApp',val:profile.whatsapp,href:`https://wa.me/923106225630`},
            ].map(c => (
              <div key={c.label} tag={c.href?'a':'div'} className="contact-info-card rounded-xl p-5 flex items-center gap-4">
                <span className="text-2xl">{c.icon}</span>
                <div>
                  <p className="text-xs font-medium uppercase tracking-wider mb-1" style={{color:'var(--text-sub)'}}>{c.label}</p>
                  {c.href
                    ? <a href={c.href} target={c.href.startsWith('http')?'_blank':undefined} rel="noopener noreferrer" className="text-sm font-medium transition-colors hover:text-accent" style={{color:'var(--text-main)'}}>{c.val}</a>
                    : <p className="text-sm font-medium" style={{color:'var(--text-main)'}}>{c.val}</p>}
                </div>
              </div>
            ))}
            <div className="contact-info-card rounded-xl p-5">
              <p className="text-xs font-medium uppercase tracking-wider mb-2" style={{color:'var(--text-sub)'}}>Availability</p>
              <div className="flex items-center gap-2">
                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse" />
                <p className="text-sm font-medium" style={{color:'var(--text-main)'}}>Open to freelance &amp; collaborations</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div className={`notification ${notif.show?'show':''}`} role="status" aria-live="polite">
        <span>{notif.icon}</span>
        <div>
          <p className="font-semibold text-sm" style={{color:'var(--text-main)'}}>{notif.title}</p>
          <p className="text-xs mt-0.5" style={{color:'var(--text-sub)'}}>{notif.msg}</p>
        </div>
      </div>
    </section>
  );
}

// ── FOOTER ────────────────────────────────────────────────────
function Footer() {
  return (
    <footer className="py-8" style={{borderTop:'1px solid var(--border-col)'}} role="contentinfo">
      <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4 text-sm" style={{color:'var(--text-sub)'}}>
        <p>© 2025 <span style={{color:'#6c63ff',fontWeight:600}}>Zaid Mujtaba Khan</span>. All rights reserved.</p>
        <p className="text-xs">Built with React · Tailwind CSS · Fetch API</p>
        <a href="#home" className="hover:text-accent transition-colors">Back to top ↑</a>
      </div>
    </footer>
  );
}

// ── APP (Root) ────────────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState('dark');
  const [profile, setProfile] = useState(null);
  const [projects, setProjects] = useState([]);
  const [skills, setSkills] = useState({frontend:[],seo:[],learning:[]});
  const [testimonials, setTestimonials] = useState([]);
  const [blogs, setBlogs] = useState([]);
  const [loading, setLoading] = useState({profile:true,projects:true,skills:true,testimonials:true,blogs:true});

  const toggleTheme = () => {
    setTheme(t => {
      const next = t === 'dark' ? 'light' : 'dark';
      document.documentElement.classList.toggle('dark', next === 'dark');
      return next;
    });
  };

  useEffect(() => {
    // All API calls in parallel — swap with real fetch() when backend is ready
    fetchProfile().then(d => { setProfile(d); setLoading(l=>({...l,profile:false})); });
    fetchProjects().then(d => { setProjects(d); setLoading(l=>({...l,projects:false})); });
    fetchSkills().then(d => { setSkills(d); setLoading(l=>({...l,skills:false})); });
    fetchTestimonials().then(d => { setTestimonials(d); setLoading(l=>({...l,testimonials:false})); });
    fetchBlogs().then(d => { setBlogs(d); setLoading(l=>({...l,blogs:false})); });
  }, []);

  return (
    <>
      <Navbar theme={theme} toggleTheme={toggleTheme} />
      <main>
        <Hero profile={profile} loading={loading.profile} />
        <About profile={profile} loading={loading.profile} />
        <Projects projects={projects} loading={loading.projects} error={null} />
        <Skills skills={skills} loading={loading.skills} />
        <Blog blogs={blogs} loading={loading.blogs} />
        <Testimonials testimonials={testimonials} loading={loading.testimonials} />
        <Contact profile={profile} />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
